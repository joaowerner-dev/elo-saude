<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notícia | Elo Saúde</title>
  <meta
    name="description"
    content="Página de notícia do portal Elo Saúde com conteúdo informativo, acolhimento e apoio para famílias."
  >
  <link rel="stylesheet" href="../css/noticia.css">
</head>
<body>

  <main class="noticia-page">
    <div class="noticia-box">

      <header class="topo-logo">
        <a
          href="home.html"
          class="logo-link"
          aria-label="Voltar para a página inicial"
          title="Voltar para Home"
        >
          <img
            src="../logo.png"
            alt="Logo Elo Saúde"
            class="logo-img"
          >
        </a>
      </header>

      <section class="cabecalho-noticia">
        <span class="cabecalho-tag">Portal Elo Saúde</span>

        <h1 class="cabecalho-titulo">
          Conteúdo informativo e acolhedor
        </h1>

        <p class="cabecalho-subtitulo">
          Informação de qualidade, orientação e apoio para mães, pais,
          responsáveis e famílias que buscam cuidado, inclusão e bem-estar.
        </p>
      </section>

      <section class="area-noticia" aria-label="Conteúdo da notícia">
        <div id="conteudoNoticia" class="conteudo-dinamico"></div>
      </section>

      <footer class="noticia-rodape">
        <div class="noticia-voltar">
          <a href="home.html" class="btn btn-primary">
            Voltar para Home
          </a>
        </div>
      </footer>

    </div>
  </main>

  <script src="../js/noticia.js"></script>
</body>
</html>
