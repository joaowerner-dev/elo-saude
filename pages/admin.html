<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login do Administrador | Elo Saúde</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <main class="login-page">
    <section class="login-box">
      <div class="login-topo">
        <h1>Área do Administrador</h1>
        <p>Entre com seu nome de usuário e senha para acessar a área de postagem.</p>
      </div>

      <form
        id="formLogin"
        class="login-form"
        novalidate
        action="postagem.html"
        data-destino="postagem.html"
      >
        <div class="campo">
          <label for="usuario">Nome do administrador</label>
          <input
            type="text"
            id="usuario"
            name="usuario"
            placeholder="Digite seu nome"
            autocomplete="username"
            required
          >
          <small class="erro" id="erroUsuario"></small>
        </div>

        <div class="campo">
          <label for="senha">Senha</label>

          <div class="senha-box">
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="Digite sua senha"
              autocomplete="current-password"
              required
            >
            <button type="button" id="toggleSenha" class="toggle-senha">
              Mostrar
            </button>
          </div>

          <small class="erro" id="erroSenha"></small>
        </div>

        <div id="mensagemLogin" class="mensagem"></div>

        <button type="submit" class="btn-login">Entrar</button>
      </form>

      <div class="login-info">
        <p><strong>Usuário de teste:</strong> admin</p>
        <p><strong>Senha de teste:</strong> 123456</p>
      </div>
    </section>
  </main>

  <script src="../js/admin.js"></script>
</body>
</html>
